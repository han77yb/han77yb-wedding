<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>우리의 모바일 청첩장</title>

    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Stylish&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="fullscreen-image">
      <img src="picture/pic01.png" alt="청첩장 첫 사진" />
      <div class="particle-container"></div>

      <div class="wedding-text">Wedding</div>
      <div class="names-container">
        <div class="name-block">
          <div class="name english">Hyebin</div>
          <div class="name korean">한혜빈</div>
        </div>
        <div class="divider"></div>
        <div class="name-block">
          <div class="name english">Hanyoung</div>
          <div class="name korean">김한영</div>
        </div>
      </div>
      <div class="date-text">2025. 06. 14. SAT. 11:30</div>
      <div class="place-text">63빌딩 58F 터치더스카이 비너스룸</div>
    </div>

    <section>
      <div class="custom-text">
        <span>당신을 완벽하게 만들어줄</span>
        <span>사람은 필요 없다.</span>
        <br />
        <span>당신의 완벽함을 받아줄</span>
        <span>누군가 필요할 뿐이다.</span>
        <br />
        <span>- 라푼젤 中 -</span>
      </div>
    </section>

    <section>
      <h2>💌 연락처</h2>
      <div class="contacts">
        <div class="contact-card">
          <img src="groom.png" alt="신랑" />
          <h3>신랑 김한영</h3>
          <a href="tel:010-1234-5678">📞 전화걸기</a>
          <a href="mailto:groom@example.com">✉️ 이메일 보내기</a>
        </div>
        <div class="contact-card">
          <img src="bride.png" alt="신부" />
          <h3>신부 한혜빈</h3>
          <a href="tel:010-8765-4321">📞 전화걸기</a>
          <a href="mailto:bride@example.com">✉️ 이메일 보내기</a>
        </div>
      </div>
    </section>

    <section>
      <h2>🎉 축하 메시지</h2>
      <form onsubmit="submitData(event)">
        <input type="text" id="name" placeholder="이름을 입력하세요" required />
        <textarea id="value" rows="4" placeholder="축하 메시지를 입력하세요" required></textarea>
        <button type="submit">작성</button>
      </form>
      <div id="output2">
        <h3>축하 메시지 목록</h3>
      </div>
    </section>

    <section>
      <h2>💖 마음 전하실 곳</h2>
      <div class="accordion">
        <button onclick="toggleAccordion(this)">신랑측 계좌번호 확인하기</button>
        <div class="accordion-content">
          <div class="account-item">
            <label>예금주: 김한영</label>
            <div class="account-info">
              <input value="야호은행 123-456789-00" readonly />
              <button class="button" onclick="copyToClipboard('야호은행 123-456789-00')">복사하기</button>
            </div>
          </div>
        </div>
      </div>

      <div class="accordion">
        <button onclick="toggleAccordion(this)">신부측 계좌번호 확인하기</button>
        <div class="accordion-content">
          <div class="account-item">
            <label>예금주: 한혜빈</label>
            <div class="account-info">
              <input value="유후은행 123-456789-01" readonly />
              <button class="button" onclick="copyToClipboard('유후은행 123-456789-01')">복사하기</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer>
      <p>&copy; 2025 우리의 모바일 청첩장</p>
    </footer>
  </body>
</html>
