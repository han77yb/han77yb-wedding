<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>우리의 모바일 청첩장</title>
  <link rel="stylesheet" href="assets/style.css">
  
  <script defer src="https://cdn.commento.io/js/commento.js"></script>
  <style>
    /* 댓글 섹션 스타일 */
    #commento {
      max-width: 700px;
      margin: 20px auto;
      font-family: 'Arial', sans-serif;
      border: 1px solid #ddd;
      padding: 20px;
      border-radius: 8px;
      background-color: #f9f9f9;
    }

    /* 댓글 입력 박스 */
    #commento textarea {
      border-radius: 5px;
      border: 1px solid #ccc;
      padding: 10px;
      width: 100%;
      margin-bottom: 10px;
    }

    /* 댓글 버튼 */
    #commento button {
      background-color: #4CAF50;
      color: white;
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    #commento button:hover {
      background-color: #45a049;
    }

    /* 댓글 목록 스타일 */
    #commento .commento-root .commento-main-thread {
      margin-top: 20px;
    }

    #commento .commento-comment {
      border-bottom: 1px solid #eee;
      padding: 10px 0;
    }

    /* 댓글 작성자 이름 */
    #commento .commento-name {
      font-weight: bold;
      color: #333;
    }

    /* 댓글 내용 */
    #commento .commento-body {
      margin-top: 5px;
    }
  </style>
  
</head>
<body>
  <header>
    <h1>우리의 모바일 청첩장</h1>
    <p>특별한 날, 함께 해주세요!</p>
  </header>

  <section>
    <h2>📋 초대의 글</h2>
    <p>소중한 분들과 함께 이 날을 축복받고 싶습니다.</p>
  </section>

  <section>
    <h2>🎉 축하 메시지</h2>
    <div id="commento"></div>
  </section>

  <footer>
    <p>&copy; 2025 우리의 모바일 청첩장</p>
  </footer>
</body>
</html>
